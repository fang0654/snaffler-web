{% extends "findings/base.html" %}

{% block title %}SMB login — Snaffler{% endblock %}

{% block content %}
<div class="card" style="max-width:28rem;">
  <h2 style="margin-top:0;">SMB credentials</h2>
  <p class="muted">Stored in your session only (cleared when the session ends). Used for <code>smbclient.py</code> WebSocket terminals.</p>
  <form method="post" action="{% url 'findings:smb_credentials' %}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}"/>
    <label for="domain">Domain (optional)</label>
    <input id="domain" name="domain" type="text" value="{{ domain }}" autocomplete="organization" style="width:100%; margin-bottom:0.75rem;"/>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username" required style="width:100%; margin-bottom:0.75rem;"/>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="{% if password_saved %}Leave blank to keep saved password{% else %}Required{% endif %}" style="width:100%; margin-bottom:0.75rem;"/>
    <button type="submit">Save</button>
  </form>
  <p class="muted" style="margin-top:1rem;"><a href="{% url 'findings:home' %}">← Imports</a></p>
</div>
{% endblock %}
